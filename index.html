<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ระบบจัดการค่าเช่าที่ดินและห้องเช่า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2733; --muted:#6b7785; --line:#e3e7ec; --bg:#f4f6f8; --surface:#ffffff;
    --primary:#0f766e; --primary-d:#0b5a54; --primary-soft:#e6f3f1;
    --amber:#b45309; --amber-soft:#fef3e2; --red:#c0392b; --red-soft:#fdecea;
    --green:#15803d; --green-soft:#e7f5ec; --blue:#1d4ed8; --shadow:0 1px 3px rgba(20,30,45,.08),0 6px 18px rgba(20,30,45,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
  h1,h2,h3,.brand{font-family:'Prompt',sans-serif;margin:0}
  button,input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--primary)}

  /* layout */
  header.top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#11605a,#0f766e);color:#fff;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  .top .row{display:flex;align-items:center;gap:10px}
  .brand{font-size:18px;font-weight:700;letter-spacing:.2px}
  .brand small{display:block;font-family:'Sarabun';font-weight:400;font-size:11px;opacity:.85;letter-spacing:0}
  .top .spacer{flex:1}
  .btn-ghost-light{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:9px;padding:7px 11px;font-size:13px}

  nav.tabs{display:flex;overflow-x:auto;gap:4px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:53px;z-index:30;padding:6px 8px;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{white-space:nowrap;border:0;background:transparent;color:var(--muted);padding:8px 12px;border-radius:9px;font-weight:600;font-size:14px}
  nav.tabs button.active{background:var(--primary-soft);color:var(--primary-d)}

  main{max-width:980px;margin:0 auto;padding:14px 12px 90px}
  .page{display:none}
  .page.show{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
  .card h2{font-size:16px;margin-bottom:4px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:10px}
  .section-title{display:flex;align-items:center;gap:8px;margin:4px 2px 10px}
  .section-title h2{font-size:18px}
  .section-title .spacer{flex:1}

  .btn{border:0;border-radius:10px;padding:9px 14px;font-weight:600;background:var(--primary);color:#fff;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.sm{padding:6px 10px;font-size:13px;border-radius:8px}
  .btn.alt{background:var(--surface);color:var(--primary-d);border:1px solid var(--primary);}
  .btn.grey{background:#eef1f4;color:#33414f;border:1px solid var(--line)}
  .btn.warn{background:var(--amber)}
  .btn.danger{background:var(--red)}
  .btn.block{width:100%}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  label.f{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin:0 0 3px 2px}
  .inp{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fbfcfd;color:var(--ink)}
  .inp:focus{outline:2px solid var(--primary-soft);border-color:var(--primary)}
  textarea.inp{resize:vertical;min-height:54px}
  .field{margin-bottom:9px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;background:#eef1f4;color:#475260}
  .pill.green{background:var(--green-soft);color:var(--green)}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .pill.red{background:var(--red-soft);color:var(--red)}
  .pill.blue{background:#e7eefc;color:var(--blue)}
  .pill.teal{background:var(--primary-soft);color:var(--primary-d)}

  .item{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--surface)}
  .item .hd{display:flex;align-items:flex-start;gap:10px}
  .item .hd .nm{font-weight:700;font-family:'Prompt'}
  .item .hd .spacer{flex:1}
  .meta{color:var(--muted);font-size:13px;margin-top:2px}
  .kv{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:8px;font-size:13.5px}
  .kv b{font-weight:600}
  .row-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

  .stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(max-width:520px){.stat{grid-template-columns:1fr 1fr}}
  .stat .s{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center;box-shadow:var(--shadow)}
  .stat .s .n{font-family:'Prompt';font-size:22px;font-weight:700;line-height:1.1}
  .stat .s .l{font-size:12px;color:var(--muted);margin-top:2px}
  .stat .s.amber .n{color:var(--amber)} .stat .s.red .n{color:var(--red)} .stat .s.green .n{color:var(--green)} .stat .s.teal .n{color:var(--primary-d)}

  table.bill{width:100%;border-collapse:collapse;font-size:13.5px}
  table.bill th,table.bill td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
  table.bill th:first-child,table.bill td:first-child{text-align:left}
  table.bill th{color:var(--muted);font-weight:600;font-size:12px;background:#fafbfc}
  .num{font-variant-numeric:tabular-nums}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,25,35,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .modal-bg.show{display:flex}
  .modal{background:var(--surface);width:100%;max-width:640px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:16px 14px 22px;animation:up .22s ease}
  @media(min-width:680px){.modal-bg{align-items:center}.modal{border-radius:18px}}
  @keyframes up{from{transform:translateY(28px);opacity:.6}to{transform:none;opacity:1}}
  .modal h3{font-size:17px;margin-bottom:2px}
  .modal .mh{display:flex;align-items:center;margin-bottom:12px}
  .modal .mh .spacer{flex:1}
  .x{border:0;background:#eef1f4;border-radius:9px;width:34px;height:34px;font-size:18px;color:#55626f}

  .empty{text-align:center;color:var(--muted);padding:26px 10px}
  .empty .big{font-size:30px;margin-bottom:6px}
  .hint{background:var(--primary-soft);border:1px solid #cfe7e3;color:var(--primary-d);border-radius:10px;padding:9px 11px;font-size:13px;margin-bottom:10px}
  .warnbox{background:var(--amber-soft);border:1px solid #f3dcb5;color:var(--amber);border-radius:10px;padding:9px 11px;font-size:13px;margin-bottom:10px}
  .alertbox{background:var(--red-soft);border:1px solid #f3c6c0;color:var(--red);border-radius:10px;padding:9px 11px;font-size:13px;margin-bottom:10px}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .right{text-align:right}
  .mini{font-size:12px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1f2733;color:#fff;padding:10px 16px;border-radius:11px;font-size:14px;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-2px)}
  .sub-rooms{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line)}
  .room-line{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f2f5}
  .room-line .spacer{flex:1}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#0f766e,#0b463f)}
  .login-card{background:#fff;border-radius:18px;padding:24px 20px;width:100%;max-width:360px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .login-card h1{font-size:20px;color:var(--primary-d);text-align:center}
  .login-card p{color:var(--muted);font-size:13px;text-align:center;margin:4px 0 16px}
  .lock-dot{width:54px;height:54px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="loginGate" class="login-wrap">
  <div class="login-card">
    <div class="lock-dot">🔐</div>
    <h1>เข้าสู่ระบบ</h1>
    <p>ระบบจัดการค่าเช่าที่ดิน &amp; ห้องเช่า</p>
    <div class="field"><label class="f">ชื่อผู้ใช้</label><input id="lgUser" class="inp" autocomplete="off" placeholder="username"></div>
    <div class="field"><label class="f">รหัสผ่าน</label><input id="lgPass" class="inp" type="password" autocomplete="off" placeholder="password"></div>
    <button class="btn block" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="lgMsg" class="mini right" style="margin-top:8px;color:var(--red)"></div>
    <div class="mini" style="margin-top:14px;text-align:center">ครั้งแรก: ผู้ใช้ <b>admin</b> รหัส <b>1234</b> (เปลี่ยนได้ในเมนูตั้งค่า)</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="top">
    <div class="row">
      <div class="brand">ระบบค่าเช่า<small id="topSub">ที่ดิน &amp; ห้องเช่า</small></div>
      <div class="spacer"></div>
      <span id="syncBadge" class="mini" style="color:#d7f0ec;margin-right:8px"></span>
      <button class="btn-ghost-light" onclick="lockNow()">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="dash" class="active" onclick="go('dash')">แดชบอร์ด</button>
    <button data-tab="land" onclick="go('land')">ที่ดินเช่า</button>
    <button data-tab="zone" onclick="go('zone')">บ้าน/ห้องเช่า</button>
    <button data-tab="bill" onclick="go('bill')">ออกบิล &amp; มิเตอร์</button>
    <button data-tab="pay" onclick="go('pay')">ประวัติชำระ</button>
    <button data-tab="set" onclick="go('set')">ตั้งค่า</button>
  </nav>

  <main>
    <section id="page-dash" class="page show"></section>
    <section id="page-land" class="page"></section>
    <section id="page-zone" class="page"></section>
    <section id="page-bill" class="page"></section>
    <section id="page-pay" class="page"></section>
    <section id="page-set" class="page"></section>
  </main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ระบบจัดการค่าเช่าที่ดินและห้องเช่า  (ES5, single-file, localStorage)
   - แสดงปี พ.ศ.  - รองรับ iOS Safari
   ============================================================ */

/* ---------- localStorage namespace ---------- */
var NS = 'RENTSYS_';
function lsGet(k){ try{ return localStorage.getItem(NS+k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(NS+k,v); }catch(e){} }

/* ---------- DB ---------- */
var DB = { lands:[], zones:[], settings:{ user:'admin', pass:'1234' } };

function loadDB(){
  var raw = lsGet('db');
  if(raw){
    try{ var o = JSON.parse(raw); if(o){ DB = o; } }catch(e){}
  }
  if(!DB.lands) DB.lands=[];
  if(!DB.zones) DB.zones=[];
  if(!DB.settings) DB.settings={ user:'admin', pass:'1234' };
  if(DB.settings.bizName==null) DB.settings.bizName='';
  if(DB.settings.bizPhone==null) DB.settings.bizPhone='';
  if(DB.settings.apiUrl==null) DB.settings.apiUrl='';
  if(DB.settings.cloudUser==null) DB.settings.cloudUser='admin';
  var i;
  for(i=0;i<DB.lands.length;i++){ var L=DB.lands[i];
    if(L.periodStart==null){ L.periodStart = L.nextDue || todayISO(); L.payOffsetMonths = 0; L.payDay = 0; }
    if(L.payOffsetMonths==null) L.payOffsetMonths=0;
    if(L.outstanding==null) L.outstanding=0;
  }
  if(!lsGet('balMig')){
    for(i=0;i<DB.lands.length;i++){ var Lm=DB.lands[i]; Lm.outstanding = num(Lm.outstanding)+num(Lm.rent); }
    lsSet('balMig','1');
  }
}
function saveDB(){ DB.updatedAt=Date.now(); lsSet('db', JSON.stringify(DB)); schedulePush(); }
function saveDBLocal(){ lsSet('db', JSON.stringify(DB)); }

/* ===== Cloud sync (Google Apps Script + Sheets) ===== */
function cloudConnected(){ return !!(DB.settings && DB.settings.apiUrl && (lsGet('cloudToken')||'')); }
function nowHM(){ var d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function setSync(t){ var b=el('syncBadge'); if(b) b.textContent=t?('☁ '+t):''; var s=el('syncStatusLine'); if(s&&t) s.textContent='สถานะ: '+t; }
var pushTimer=null;
function schedulePush(){ if(!cloudConnected()) return; if(pushTimer) clearTimeout(pushTimer); pushTimer=setTimeout(cloudPush,1500); }
function cloudCall(action, extra, cb){
  var url=DB.settings.apiUrl; if(!url){ cb({ok:false,error:'ยังไม่ตั้ง URL'}); return; }
  var body={action:action, user:DB.settings.cloudUser||'', token:lsGet('cloudToken')||''};
  for(var k in extra){ if(extra.hasOwnProperty(k)) body[k]=extra[k]; }
  if(!window.fetch){ cb({ok:false,error:'เบราว์เซอร์ไม่รองรับ'}); return; }
  fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})
   .then(function(r){ return r.json(); })
   .then(function(j){ cb(j); })
   .catch(function(e){ cb({ok:false,error:String(e)}); });
}
function cloudLogin(){
  var url=el('cl_url').value.trim(), u=el('cl_user').value.trim(), p=el('cl_pass').value;
  if(!url){ toast('กรุณาใส่ Web App URL'); return; }
  DB.settings.apiUrl=url; DB.settings.cloudUser=u; saveDBLocal();
  setSync('กำลังเชื่อมต่อ...');
  if(!window.fetch){ toast('เบราว์เซอร์ไม่รองรับ'); return; }
  fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'login',user:u,pass:p})})
   .then(function(r){ return r.json(); })
   .then(function(j){
     if(j.ok){ lsSet('cloudToken', j.token); toast('เชื่อมต่อสำเร็จ'); setSync('เชื่อมต่อแล้ว'); cloudPull(true); }
     else { toast('เชื่อมต่อไม่สำเร็จ: '+(j.error||'')); setSync('เชื่อมต่อล้มเหลว'); }
     renderSet();
   })
   .catch(function(e){ toast('เชื่อมต่อไม่ได้ ตรวจ URL/อินเทอร์เน็ต'); setSync('เชื่อมต่อล้มเหลว'); });
}
function cloudPush(){
  if(!cloudConnected()) return;
  setSync('กำลังอัปโหลด...');
  cloudCall('save', {json:JSON.stringify(DB), updatedAt:(DB.updatedAt||Date.now())}, function(j){
    if(j.ok){ setSync('ซิงก์แล้ว '+nowHM()); }
    else { setSync('อัปโหลดล้มเหลว'); if(j.error==='auth'){ lsSet('cloudToken',''); } }
  });
}
function cloudPull(silent){
  if(!cloudConnected()){ if(!silent) toast('ยังไม่ได้เชื่อมต่อคลาวด์'); return; }
  setSync('กำลังดึงข้อมูล...');
  cloudCall('load', {}, function(j){
    if(j.ok){
      if(j.json){
        try{
          var remote=JSON.parse(j.json);
          var localT=DB.updatedAt||0, remoteT=Number(j.updatedAt)||0;
          if(remoteT>=localT){
            var keepUrl=DB.settings.apiUrl, keepUser=DB.settings.cloudUser;
            DB=remote; if(!DB.settings) DB.settings={};
            DB.settings.apiUrl=keepUrl; DB.settings.cloudUser=keepUser;
            saveDBLocal(); if(!silent) toast('ดึงข้อมูลจากคลาวด์แล้ว'); go(CUR);
          } else { if(!silent) toast('ข้อมูลในเครื่องใหม่กว่า — อัปโหลดแทน'); cloudPush(); }
        }catch(e){ toast('ข้อมูลคลาวด์อ่านไม่ได้'); }
      } else { if(!silent) toast('คลาวด์ยังว่าง — อัปโหลดข้อมูลเครื่องนี้'); cloudPush(); }
      setSync('ซิงก์แล้ว '+nowHM());
    } else { setSync('ดึงข้อมูลล้มเหลว'); if(!silent) toast('ดึงข้อมูลไม่สำเร็จ: '+(j.error||'')); }
  });
}
function cloudDisconnect(){ lsSet('cloudToken',''); toast('ตัดการเชื่อมต่อแล้ว'); setSync(''); renderSet(); }

/* ---------- utils ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function num(v){ var n=parseFloat(v); return isNaN(n)?0:n; }
function money(n){
  n = num(n);
  var s = n.toFixed(2);
  var parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts[0]+'.'+parts[1];
}
function el(id){ return document.getElementById(id); }
function esc(s){ if(s==null) return ''; return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* dates: store ISO yyyy-mm-dd, display พ.ศ. */
var TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var TH_MONTHS_FULL = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function pad2(n){ return n<10?('0'+n):(''+n); }
function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function parseISO(iso){ if(!iso) return null; var p=(''+iso).split('-'); return new Date(num(p[0]), num(p[1])-1, num(p[2])); }
function isoFromDate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function fmtBE(iso){
  var d = parseISO(iso); if(!d||isNaN(d.getTime())) return '-';
  return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+(d.getFullYear()+543);
}
function fmtBEshort(iso){
  var d = parseISO(iso); if(!d||isNaN(d.getTime())) return '-';
  return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+((d.getFullYear()+543)%100);
}
function addMonths(iso, m){
  var d = parseISO(iso); if(!d) return iso;
  var day = d.getDate();
  d.setDate(1);
  d.setMonth(d.getMonth()+m);
  var last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  d.setDate(Math.min(day,last));
  return isoFromDate(d);
}
function daysBetween(isoA, isoB){
  var a=parseISO(isoA), b=parseISO(isoB); if(!a||!b) return 0;
  return Math.round((b.getTime()-a.getTime())/86400000);
}
function freqMonths(f){ return f==='monthly'?1 : f==='semi'?6 : f==='yearly'?12 : f==='tri'?36 : 1; }
function freqLabel(f){ return f==='monthly'?'รายเดือน' : f==='semi'?'รายครึ่งปี' : f==='yearly'?'รายปี' : f==='tri'?'ราย 3 ปี' : '-'; }
function timingLabel(t){ return t==='before'?'เก็บก่อนรอบเช่า' : t==='during'?'เก็บระหว่างรอบเช่า' : t==='after'?'เก็บหลังรอบเช่า' : '-'; }
function setDay(iso, day){
  if(!day) return iso;
  var d=parseISO(iso); if(!d) return iso;
  var last=new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  d.setDate(Math.min(num(day),last));
  return isoFromDate(d);
}
/* วันครบกำหนดจ่ายของรอบปัจจุบัน = วันเริ่มรอบ + payOffsetMonths (กำหนดวันที่ด้วย payDay ได้) */
function landDue(L){
  if(L.dueOverride) return L.dueOverride;
  if(!L.periodStart) return L.nextDue||todayISO();
  var base=addMonths(L.periodStart, num(L.payOffsetMonths||0));
  base=setDay(base, num(L.payDay||0));
  return base;
}
function landPeriodEnd(L){
  if(!L.periodStart) return null;
  var endStart=addMonths(L.periodStart, freqMonths(L.frequency));
  var d=parseISO(endStart); d.setDate(d.getDate()-1);
  return isoFromDate(d);
}
function landPeriodLabel(L){
  if(!L.periodStart) return '-';
  return fmtBE(L.periodStart)+' – '+fmtBE(landPeriodEnd(L));
}
function landTimingAuto(L){
  var o=num(L.payOffsetMonths||0), F=freqMonths(L.frequency);
  if(o<0) return 'เก็บก่อนรอบเช่า (ล่วงหน้า '+(-o)+' เดือน)';
  if(o===0) return 'เก็บต้นรอบเช่า';
  if(o<F) return 'เก็บระหว่างรอบ (เดือนที่ '+(o+1)+')';
  return 'เก็บหลังจบรอบเช่า';
}
function landAdvance(L){
  L.periodStart = addMonths(L.periodStart, freqMonths(L.frequency));
  L.dueOverride = null;
}
/* หาวันเริ่มรอบที่ครอบคลุมวันนี้ จาก anchor (ปี,เดือน0) และความถี่ F เดือน */
function alignedStart(F, anchorY, anchorM){
  var t=new Date();
  var diff=(t.getFullYear()-anchorY)*12 + (t.getMonth()-anchorM);
  var k=Math.floor(diff/F);
  var d=new Date(anchorY, anchorM + k*F, 1);
  return isoFromDate(d);
}

/* ============================================================
   LOGIN  (token-based simple gate; rehashed per session)
   ============================================================ */
function hash(s){ var h=5381,i; for(i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h=h&0xffffffff; } return (h>>>0).toString(16); }
function sessionToken(){ return hash(DB.settings.user+'|'+DB.settings.pass+'|salt9x'); }
function doLogin(){
  var u=el('lgUser').value.trim(), p=el('lgPass').value;
  if(u===DB.settings.user && p===DB.settings.pass){
    lsSet('token', sessionToken());
    showApp();
  } else {
    el('lgMsg').textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
  }
}

function checkSession(){ return lsGet('token') && lsGet('token')===sessionToken(); }

/* ============================================================

   ============================================================ */
function landStatus(L){
  var due=landDue(L); var owe=num(L.outstanding);
  if(!due) return {label:'ยังไม่ตั้งกำหนด',cls:'',days:9999};
  var d = daysBetween(todayISO(), due); // + = future
  if(owe<=0) return {label:'ชำระครบ',cls:'green',days:d};
  if(d<0) return {label:'เลยกำหนด '+(-d)+' วัน • ค้าง '+money(owe),cls:'red',days:d};
  if(d<=7) return {label:'ใกล้ครบ '+d+' วัน • ค้าง '+money(owe),cls:'amber',days:d};
  return {label:'ครบ '+fmtBEshort(due)+' • ค้าง '+money(owe),cls:'amber',days:d};
}

function renderDash(){
  var p=el('page-dash');
  var totalLandOutstanding=0, totalRoomOutstanding=0, dueSoon=[], overdue=[], depositHeld=0;
  var i,j;
  for(i=0;i<DB.lands.length;i++){
    var L=DB.lands[i];
    var owe=num(L.outstanding); if(owe>0) totalLandOutstanding += owe;
    var ld=landDue(L); var gap=daysBetween(todayISO(), ld);
    if(owe>0 && gap<0) overdue.push({type:'land',name:L.name||L.tenantName,info:'ที่ดิน • '+freqLabel(L.frequency),due:ld,extra:'ค้าง '+money(owe)+' บ. (เลย '+(-gap)+' วัน)'});
    else if(owe>0 && gap<=7) dueSoon.push({type:'land',name:L.name||L.tenantName,info:'ที่ดิน • ครบ '+fmtBEshort(ld),due:ld});
  }
  for(i=0;i<DB.zones.length;i++){
    var Z=DB.zones[i];
    for(j=0;j<Z.rooms.length;j++){
      var R=Z.rooms[j];
      var bal=roomBalance(R);
      totalRoomOutstanding += bal;
      if(R.depositPaid && !R.depositReturned) depositHeld += num(R.deposit);
      var dd = roomNextUnpaidDue(Z,R);
      var dgap = dd? daysBetween(todayISO(), dd):9999;
      if(bal>0 && dgap<0){ overdue.push({type:'room',name:Z.name+' • ห้อง '+(R.no||'-'),info:R.tenantName||'',due:dd,extra:'ค้าง '+money(bal)+' บ. (เลย '+(-dgap)+' วัน)'}); }
      else if(bal>0 && dgap<=7){ dueSoon.push({type:'room',name:Z.name+' • ห้อง '+(R.no||'-'),info:'ครบ '+fmtBEshort(dd),due:dd}); }
    }
  }
  // sort
  dueSoon.sort(function(a,b){ return daysBetween(todayISO(),a.due)-daysBetween(todayISO(),b.due); });

  var roomsCount=0; for(i=0;i<DB.zones.length;i++) roomsCount+=DB.zones[i].rooms.length;

  var h='';
  h+='<div class="section-title"><h2>ภาพรวม</h2><div class="spacer"></div><span class="mini">วันนี้ '+fmtBE(todayISO())+'</span></div>';
  h+='<div class="stat">';
  h+=' <div class="s teal"><div class="n">'+DB.lands.length+'</div><div class="l">แปลงที่ดิน</div></div>';
  h+=' <div class="s teal"><div class="n">'+roomsCount+'</div><div class="l">ห้องเช่า ('+DB.zones.length+' โซน)</div></div>';
  h+=' <div class="s red"><div class="n">'+(overdue.length)+'</div><div class="l">รายการต้องตาม</div></div>';
  h+=' <div class="s amber"><div class="n">'+money(totalLandOutstanding+totalRoomOutstanding)+'</div><div class="l">ยอดค้างรวม (บาท)</div></div>';
  h+=' <div class="s green"><div class="n">'+dueSoon.length+'</div><div class="l">ใกล้ครบกำหนด (7 วัน)</div></div>';
  h+=' <div class="s teal"><div class="n">'+money(depositHeld)+'</div><div class="l">เงินประกันที่ถือไว้ (บาท)</div></div>';
  h+='</div>';

  // overdue list
  h+='<div class="card"><h2>⚠️ ต้องตามเก็บ / ค้างชำระ</h2><div class="sub">เลยกำหนด หรือมียอดคงค้าง</div>';
  if(overdue.length===0){ h+='<div class="empty"><div class="big">✅</div>ไม่มีรายการค้าง</div>'; }
  else {
    overdue.sort(function(a,b){ return (a.due?daysBetween(todayISO(),a.due):0)-(b.due?daysBetween(todayISO(),b.due):0); });
    for(i=0;i<overdue.length;i++){ var o=overdue[i];
      h+='<div class="room-line"><div><div style="font-weight:600">'+esc(o.name)+'</div><div class="mini">'+esc(o.info)+(o.due?(' • ครบ '+fmtBEshort(o.due)):'')+'</div></div><div class="spacer"></div><span class="pill red">'+esc(o.extra)+'</span></div>';
    }
  }
  h+='</div>';

  // due soon
  h+='<div class="card"><h2>🔔 ใกล้ครบกำหนด (ภายใน 7 วัน)</h2>';
  if(dueSoon.length===0){ h+='<div class="empty"><div class="big">📅</div>ยังไม่มีรายการใกล้ครบ</div>'; }
  else { for(i=0;i<dueSoon.length;i++){ var s=dueSoon[i];
      h+='<div class="room-line"><div><div style="font-weight:600">'+esc(s.name)+'</div><div class="mini">'+esc(s.info)+'</div></div><div class="spacer"></div><span class="pill amber">ครบ '+fmtBEshort(s.due)+'</span></div>';
  }}
  h+='</div>';

  p.innerHTML=h;
}

function landSave(id, isNew){

  L.name=el('lf_name').value.trim();
  L.tenantName=el('lf_tenant').value.trim();
  L.phone=el('lf_phone').value.trim();
  L.tenantAddr=el('lf_addr').value.trim();
  L.owner=el('lf_owner').value.trim();
  L.deedNo=el('lf_deed').value.trim();
  L.subdistrict=el('lf_sub').value.trim();
  L.district=el('lf_dist').value.trim();
  L.province=el('lf_prov').value.trim();
  L.coords=el('lf_coords').value.trim();
  L.rent=num(el('lf_rent').value);
  L.frequency=el('lf_freq').value;
  L.periodStart=el('lf_pstart').value;
  L.payOffsetMonths=num(el('lf_off').value);
  L.payDay=num(el('lf_payday').value);

/* ============================================================
   ZONES & ROOMS (บ้าน/ห้องเช่า)
   ============================================================ */
function findZone(id){ for(var i=0;i<DB.zones.length;i++) if(DB.zones[i].id===id) return DB.zones[i]; return null; }
function findRoom(zid,rid){ var Z=findZone(zid); if(!Z) return null; for(var i=0;i<Z.rooms.length;i++) if(Z.rooms[i].id===rid) return Z.rooms[i]; return null; }

function roomBalance(R){
  // sum unpaid of bills
  var bal=0, i; var bills=R.bills||[];
  for(i=0;i<bills.length;i++){ var b=bills[i]; bal += (num(b.total)-num(b.paid)); }
  if(bal<0) bal=0;
  return bal;
}
function depositStatus(R){
  if(R.depositReturned) return {t:'คืนประกันแล้ว',c:'grey'};
  if(R.depositPaid) return {t:'เก็บประกันแล้ว',c:'green'};
  return {t:'ยังไม่เก็บประกัน',c:'amber'};
}
function nextRoomDue(Z,R){
  // estimate next due date from dueDay + last bill / today
  var day = num(R.dueDay)||1;
  var t=new Date();
  var cand=new Date(t.getFullYear(), t.getMonth(), Math.min(day,28));
  if(cand.getTime() < t.getTime()-86400000){ cand=new Date(t.getFullYear(), t.getMonth()+1, Math.min(day,28)); }
  return isoFromDate(cand);
}
/* วันครบกำหนดของบิล = dueDay ในเดือนของวันที่จดมิเตอร์ (ปรับตามจำนวนวันของเดือน) */
function billDueDate(readISO, dueDay){
  if(!dueDay) return readISO;
  var d=parseISO(readISO); if(!d) return readISO;
  var last=new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  return isoFromDate(new Date(d.getFullYear(), d.getMonth(), Math.min(num(dueDay), last)));
}
/* วันครบของบิลที่ยังค้างเร็วที่สุด (ไว้เตือน) */
function roomNextUnpaidDue(Z,R){
  var bills=R.bills||[], i, best=null;
  for(i=0;i<bills.length;i++){ var b=bills[i];
    if(num(b.total)-num(b.paid)>0 && b.dueDate){ if(!best || b.dueDate<best) best=b.dueDate; }
  }
  return best || nextRoomDue(Z,R);
}

function roomSave(zid,rid,isNew){

  R.tenantName=el('rf_tenant').value.trim();
  R.phone=el('rf_phone').value.trim();
  R.tenantAddr=el('rf_addr').value.trim();
  R.rent=num(el('rf_rent').value);
  R.deposit=num(el('rf_dep').value);
  R.depositPaid=el('rf_deppaid').checked;
  R.depositDate=el('rf_depdate').value;
  R.prevElec=num(el('rf_pe').value);
  R.prevWater=num(el('rf_pw').value);

function roomDelete(zid,rid){

    saveDB(); closeModal(); toast('ลบห้องแล้ว'); renderZone();
  });
}

function computeBills(zid){
  var Z=findZone(zid); if(!Z) return;
  var date=el('b_date').value;
  var rows=[], i, sumElecUnits=0, sumWaterUnits=0, grand=0, allSelected=true, skipped=0;
  for(i=0;i<Z.rooms.length;i++){ var R=Z.rooms[i];
    var chk=el('bc_'+R.id);
    if(chk && !chk.checked){ allSelected=false; skipped++; continue; }
    var ce=el('be_'+R.id).value, cw=el('bw_'+R.id).value;
    var curE = ce===''? num(R.prevElec) : num(ce);
    var curW = cw===''? num(R.prevWater): num(cw);
    var eu = curE-num(R.prevElec); if(eu<0) eu=0;
    var wu = curW-num(R.prevWater); if(wu<0) wu=0;
    var eAmt=eu*num(Z.elecRate), wAmt=wu*num(Z.waterRate);
    var mf = (R.chargeMeterFee? num(Z.meterFee):0);
    var total = num(R.rent)+eAmt+wAmt+mf;
    sumElecUnits+=eu; sumWaterUnits+=wu; grand+=total;
    rows.push({R:R,curE:curE,curW:curW,ePrev:num(R.prevElec),wPrev:num(R.prevWater),eu:eu,wu:wu,eAmt:eAmt,wAmt:wAmt,mf:mf,total:total,due:billDueDate(date,R.dueDay)});
  }
  if(rows.length===0){ toast('ยังไม่ได้เลือกห้อง'); return; }
  // theft check (เฉพาะตอนออกครบทุกห้อง)
  var mpe=el('bm_pe').value, mce=el('bm_ce').value, mpw=el('bm_pw').value, mcw=el('bm_cw').value;
  var mainEU = (mce!=='')? (num(mce)-num(mpe)) : null;
  var mainWU = (mcw!=='')? (num(mcw)-num(mpw)) : null;

  var h='<div class="card"><h2>📄 สรุปบิล – '+esc(Z.name)+'</h2><div class="sub">จดมิเตอร์ '+fmtBE(date)+' • ออกบิล '+rows.length+' ห้อง'+(skipped>0?(' (ข้าม '+skipped+' ห้อง)'):'')+'</div>';
  if(!allSelected && (mainEU!==null||mainWU!==null)){
    h+='<div class="warnbox">⚠️ ออกบิลไม่ครบทุกห้อง จึง<b>ข้ามการตรวจมิเตอร์รวมโซน</b> (ผลรวมจะไม่ตรงกับมิเตอร์รวม) — ตรวจมิเตอร์รวมได้เฉพาะตอนออกครบทั้งโซน</div>';
  } else {
    if(mainEU!==null){
      var diffE = mainEU - sumElecUnits;
      var cls = (Math.abs(diffE) > (mainEU*0.05)+1) ? 'alertbox':'warnbox';
      h+='<div class="'+cls+'">⚡ ไฟรวมโซนใช้ <b>'+money(mainEU)+'</b> หน่วย • รวมทุกห้อง <b>'+money(sumElecUnits)+'</b> หน่วย • ส่วนต่าง <b>'+money(diffE)+'</b> หน่วย'+(diffE>(mainEU*0.05)+1?' ⚠️ ผิดปกติ! อาจมีไฟรั่ว/ถูกใช้ฟรี':' (พื้นที่ส่วนกลาง/ปกติ)')+'</div>';
    }
    if(mainWU!==null){
      var diffW = mainWU - sumWaterUnits;
      var clsw = (Math.abs(diffW) > (mainWU*0.05)+1) ? 'alertbox':'warnbox';
      h+='<div class="'+clsw+'">💧 น้ำรวมโซนใช้ <b>'+money(mainWU)+'</b> หน่วย • รวมทุกห้อง <b>'+money(sumWaterUnits)+'</b> หน่วย • ส่วนต่าง <b>'+money(diffW)+'</b> หน่วย'+(diffW>(mainWU*0.05)+1?' ⚠️ ผิดปกติ! อาจมีน้ำรั่ว/ถูกใช้ฟรี':' (ปกติ)')+'</div>';
    }
  }
  h+='<table class="bill"><thead><tr><th>ห้อง</th><th>ครบกำหนด</th><th>ไฟ(น.)</th><th>ค่าไฟ</th><th>น้ำ(น.)</th><th>ค่าน้ำ</th><th>เช่า</th><th>รวม</th></tr></thead><tbody>';
  for(i=0;i<rows.length;i++){ var r=rows[i];
    h+='<tr><td>'+esc(r.R.no||'-')+'</td><td class="mini">'+fmtBEshort(r.due)+'</td><td class="num">'+money(r.eu)+'</td><td class="num">'+money(r.eAmt)+'</td><td class="num">'+money(r.wu)+'</td><td class="num">'+money(r.wAmt)+'</td><td class="num">'+money(r.R.rent)+(r.mf>0?'<div class="mini">+มิเตอร์ '+money(r.mf)+'</div>':'')+'</td><td class="num"><b>'+money(r.total)+'</b></td></tr>';
  }
  h+='<tr><td><b>รวม '+rows.length+' ห้อง</b></td><td></td><td class="num">'+money(sumElecUnits)+'</td><td></td><td class="num">'+money(sumWaterUnits)+'</td><td></td><td></td><td class="num"><b>'+money(grand)+'</b></td></tr>';
  h+='</tbody></table>';
  h+='<div class="row-actions"><button class="btn" onclick="saveBills(\''+zid+'\')">✓ บันทึกบิล &amp; อัปเดตมิเตอร์</button>';
  h+='<button class="btn alt" onclick="window.print()">พิมพ์</button></div>';
  h+='<div class="divider"></div><div class="mini" style="font-weight:600;margin-bottom:6px">🧾 ออกรูปใบแจ้งรายห้อง (กดเลือกห้อง)</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
  for(i=0;i<rows.length;i++){ h+='<button class="btn sm alt" onclick="billRowImage('+i+')">ห้อง '+esc(rows[i].R.no||'-')+' • '+money(rows[i].total)+'</button>'; }
  h+='</div>';
  h+='<div class="mini" style="margin-top:8px">เมื่อกดบันทึก: เลขมิเตอร์ใหม่จะถูกตั้งเป็นเลขเริ่มต้นรอบถัดไป และบิลจะไปอยู่ที่ “ค่าเช่าคงค้าง” ของแต่ละห้องตามวันครบกำหนดของห้องนั้น</div>';
  h+='</div>';
  // stash for save (เฉพาะตอนครบทุกห้องถึงจะอัปเดตมิเตอร์รวม)
  window.__lastBill = { zid:zid, date:date, rows:rows, mainE:(allSelected&&mce!==''?num(mce):null), mainW:(allSelected&&mcw!==''?num(mcw):null) };
  el('billResult').innerHTML=h;
  el('billResult').scrollIntoView({behavior:'smooth'});
}
function saveBills(zid){
  var data=window.__lastBill; if(!data||data.zid!==zid) return;
  var Z=findZone(zid); if(!Z) return;
  var i;
  for(i=0;i<data.rows.length;i++){ var r=data.rows[i]; var R=r.R;
    if(!R.bills) R.bills=[];
    R.bills.push({ id:uid(), date:data.date, dueDate:r.due, elecPrev:num(R.prevElec), elecCur:num(r.curE), waterPrev:num(R.prevWater), waterCur:num(r.curW),
      elecUnits:r.eu, waterUnits:r.wu, elecAmt:r.eAmt, waterAmt:r.wAmt, meterFee:r.mf, rent:num(R.rent), total:r.total, paid:0, payments:[] });
    R.prevElec=num(r.curE); R.prevWater=num(r.curW);
  }
  if(data.mainE!==null) Z.mainElec=data.mainE;
  if(data.mainW!==null) Z.mainWater=data.mainW;
  saveDB(); toast('บันทึกบิลแล้ว'); el('billResult').innerHTML=''; renderBill();
}

/* ============================================================
   PAYMENTS history + receive room payment (ประวัติชำระ)
   ============================================================ */
function renderPay(){
  var p=el('page-pay'), i,j,k;
  var h='<div class="section-title"><h2>รับชำระ &amp; ประวัติ (ห้องเช่า)</h2></div>';
  h+='<div class="hint">บิลที่ยังค้างจะแสดงด้านบน • รองรับ <b>แบ่งชำระ</b> (รับไม่เต็ม) และเลือก <b>ช่องทางชำระ</b></div>';
  // outstanding bills
  var outs=[];
  for(i=0;i<DB.zones.length;i++){ var Z=DB.zones[i];
    for(j=0;j<Z.rooms.length;j++){ var R=Z.rooms[j];
      var bills=R.bills||[];
      for(k=0;k<bills.length;k++){ var b=bills[k]; if(num(b.total)-num(b.paid)>0){ outs.push({Z:Z,R:R,b:b}); } }
    }
  }
  h+='<div class="card"><h2>ค้างชำระ ('+outs.length+' บิล)</h2>';
  if(outs.length===0) h+='<div class="empty"><div class="big">✅</div>ไม่มีบิลค้าง</div>';
  for(i=0;i<outs.length;i++){ var o=outs[i]; var un=num(o.b.total)-num(o.b.paid);
    var od = o.b.dueDate||o.b.date; var late = daysBetween(todayISO(), od)<0;

  h+='<div class="divider"></div><div class="row-actions"><button class="btn sm" onclick="roomBillImage(\''+zid+'\',\''+rid+'\',\''+bid+'\')">🧾 ออกรูปบิล</button><button class="btn sm alt" onclick="billEditTotal(\''+zid+'\',\''+rid+'\',\''+bid+'\')">แก้ไขยอดบิล/วันครบ</button><button class="btn sm danger" onclick="billDelete(\''+zid+'\',\''+rid+'\',\''+bid+'\')">ลบบิล</button></div>';

/* ============================================================
   INVOICE / BILL IMAGE (วาดด้วย Canvas → PNG, ดาวน์โหลด/แชร์)
   ============================================================ */
function withFonts(cb){ if(document.fonts && document.fonts.ready){ document.fonts.ready.then(cb); setTimeout(cb,400); } else { cb(); } }
function safeName(s){ return (''+s).replace(/\s+/g,'_').replace(/[\/\\:*?"<>|]+/g,''); }
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function makeInvoiceCanvas(data){
  var W=760, P=44, PX=44, scale=2;
  var items=data.items||[];
  var metaRows=Math.max(data.metaLeft.length, data.metaRight.length);
  var hasPaid=(data.paid!=null);
  // ---- measure height (mirror of draw increments) ----
  var y=122; // content top (after 96 header + 26 gap)
  y += metaRows*26 + 16;            // meta block
  y += 38;                          // table header
  var k; for(k=0;k<items.length;k++){ y += items[k].sub?56:40; }
  y += 8;                           // table bottom gap
  y += 12;                          // totals top gap
  if(hasPaid) y += 2*24 + 12 + 60; else y += 60; // small lines + amount box
  y += 64 + (data.note?19:0);       // footer
  var H=y;
  var c=document.createElement('canvas');
  c.width=W*scale; c.height=H*scale;
  var ctx=c.getContext('2d'); ctx.scale(scale,scale);
  ctx.textBaseline='alphabetic';
  // page bg
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

  // ---- header strip (gradient) ----
  var g=ctx.createLinearGradient(0,0,0,96); g.addColorStop(0,'#13796f'); g.addColorStop(1,'#0b5048');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,96);
  // logo badge
  ctx.fillStyle='#ffffff'; roundRectPath(ctx,PX,26,46,46,12); ctx.fill();
  ctx.fillStyle='#0f766e'; ctx.font='700 26px Prompt, Sarabun, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('฿', PX+23, 51);
  // biz name + phone
  ctx.textAlign='left'; ctx.fillStyle='#ffffff';
  ctx.font='700 22px Prompt, Sarabun, sans-serif'; ctx.fillText(data.bizName||'ใบแจ้งค่าเช่า', PX+62, 41);
  if(data.bizPhone){ ctx.globalAlpha=0.88; ctx.font='400 13px Sarabun, sans-serif'; ctx.fillText('โทร '+data.bizPhone, PX+62, 65); ctx.globalAlpha=1; }
  // title (right)
  ctx.textAlign='right'; ctx.font='600 18px Prompt, Sarabun, sans-serif'; ctx.fillText(data.title, W-PX, 40);
  // status pill (right, under title)
  if(data.statusText){
    ctx.font='600 12px Sarabun, sans-serif'; var tw=ctx.measureText(data.statusText).width; var pw=tw+24, ph=23, px=W-PX-pw, py=54;
    ctx.fillStyle='#ffffff'; roundRectPath(ctx,px,py,pw,ph,11); ctx.fill();
    ctx.fillStyle=data.statusColor||'#0f766e'; ctx.textAlign='center'; ctx.fillText(data.statusText, px+pw/2, py+ph/2+1);
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  // ---- meta two columns ----
  y=122; var colR=W*0.54, my=y;
  function drawMeta(rows, x){
    var yy=my, i;
    for(i=0;i<rows.length;i++){
      ctx.fillStyle='#8a95a1'; ctx.font='600 11.5px Sarabun, sans-serif'; ctx.fillText(rows[i][0], x, yy);
      ctx.fillStyle='#1f2733'; ctx.font='500 15px Sarabun, sans-serif'; ctx.fillText(rows[i][1]||'-', x, yy+18);
      yy+=26;
    }
  }
  drawMeta(data.metaLeft, P); drawMeta(data.metaRight, colR);
  y = my + metaRows*26 + 16;

  // ---- items table ----
  // header band
  ctx.fillStyle='#e6f3f1'; roundRectPath(ctx,P,y,W-2*P,30,8); ctx.fill();
  ctx.fillStyle='#0b5a54'; ctx.font='600 13px Sarabun, sans-serif'; ctx.textBaseline='middle';
  ctx.fillText('รายการ', P+16, y+16);
  ctx.textAlign='right'; ctx.fillText('จำนวนเงิน (บาท)', W-P-16, y+16); ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  var tableTop=y; y+=38;
  var i;
  for(i=0;i<items.length;i++){ var it=items[i]; var rh=it.sub?56:40;
    if(i%2===1){ ctx.fillStyle='#f7f9fa'; ctx.fillRect(P,y-12,W-2*P,rh); }
    ctx.fillStyle='#1f2733'; ctx.font='600 15px Sarabun, sans-serif'; ctx.fillText(it.label, P+16, y+10);
    ctx.textAlign='right'; ctx.font='600 16px Prompt, Sarabun, sans-serif'; ctx.fillText(money(it.amount), W-P-16, y+10); ctx.textAlign='left';
    if(it.sub){ ctx.fillStyle='#6b7785'; ctx.font='400 12.5px Sarabun, sans-serif'; ctx.fillText(it.sub, P+16, y+32); }
    y+=rh;
  }
  // table outer border
  ctx.strokeStyle='#e3e7ec'; ctx.lineWidth=1; roundRectPath(ctx,P,tableTop,W-2*P,(y-12)-tableTop+12,8); ctx.stroke();
  y+=8;

  // ---- totals ----
  y+=12;
  function smallTotal(label,val,color){
    ctx.fillStyle='#6b7785'; ctx.font='400 14px Sarabun, sans-serif'; ctx.textAlign='left'; ctx.fillText(label, colR, y+4);
    ctx.fillStyle=color||'#1f2733'; ctx.font='500 15px Prompt, Sarabun, sans-serif'; ctx.textAlign='right'; ctx.fillText(money(val)+' บ.', W-P, y+4); ctx.textAlign='left';
    y+=24;
  }
  function amountBox(label,val,tone){
    var owe = (tone==='paid')? false : (val>0.005);
    var bh=56;
    ctx.fillStyle = owe? '#fdecea':'#e7f5ec'; roundRectPath(ctx,P,y,W-2*P,bh,12); ctx.fill();
    ctx.fillStyle = owe? '#c0392b':'#15803d'; roundRectPath(ctx,P,y,6,bh,3); ctx.fill();
    ctx.textBaseline='middle';
    ctx.fillStyle = owe? '#8f2a20':'#0d5a2c'; ctx.font='600 15px Prompt, Sarabun, sans-serif'; ctx.textAlign='left'; ctx.fillText(label, P+22, y+bh/2);
    ctx.fillStyle = owe? '#c0392b':'#15803d'; ctx.font='700 27px Prompt, Sarabun, sans-serif'; ctx.textAlign='right'; ctx.fillText(money(val)+' บ.', W-P-20, y+bh/2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    y+=bh;
  }
  if(hasPaid){
    smallTotal('รวมทั้งสิ้น', data.total);
    smallTotal('ชำระแล้ว', data.paid, '#15803d');
    y+=8;
    amountBox(data.balanceLabel||'คงเหลือต้องชำระ', data.balance, data.boxTone);
  } else {
    amountBox(data.totalLabel||'ยอดที่ต้องชำระ', data.total, data.boxTone);
  }

  // ---- footer ----
  y+=20; ctx.strokeStyle='#e3e7ec'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(P,y); ctx.lineTo(W-P,y); ctx.stroke();
  y+=22;
  if(data.note){ ctx.fillStyle='#6b7785'; ctx.font='400 13px Sarabun, sans-serif'; ctx.fillText(data.note, P, y); y+=19; }
  ctx.fillStyle='#9aa4ad'; ctx.font='400 11.5px Sarabun, sans-serif';
  ctx.fillText('ออกเมื่อ '+fmtBE(todayISO())+' • ระบบจัดการค่าเช่า', P, y);
  return c;
}
function showInvoiceModal(canvas, filename){
  var url=canvas.toDataURL('image/png');
  var h='<div class="mh"><h3>ใบแจ้งค่าเช่า / บิล</h3><div class="spacer"></div><button class="x" onclick="closeModal()">×</button></div>';
  h+='<img src="'+url+'" style="width:100%;border:1px solid var(--line);border-radius:10px;display:block">';
  h+='<div class="grid" style="margin-top:10px"><a class="btn block" href="'+url+'" download="'+filename+'">⬇ ดาวน์โหลดรูป</a>';
  h+='<button class="btn block alt" id="shareBtn">📤 แชร์ / ส่ง LINE</button></div>';
  h+='<div class="mini" style="margin-top:6px">บนมือถือ: กด “แชร์” เพื่อส่งให้ผู้เช่าทาง LINE ได้เลย • หรือกดค้างที่รูปเพื่อบันทึกภาพ</div>';
  openModal(h);
  var btn=el('shareBtn'); if(btn) btn.onclick=function(){ shareCanvas(canvas, filename); };
}
function shareCanvas(canvas, filename){
  if(canvas.toBlob){
    canvas.toBlob(function(blob){
      try{
        if(navigator.share && window.File){
          var file=new File([blob], filename, {type:'image/png'});
          if(!navigator.canShare || navigator.canShare({files:[file]})){
            navigator.share({files:[file], title:'ใบแจ้งค่าเช่า', text:'ใบแจ้งค่าเช่า'});
            return;
          }
        }
      }catch(e){}
      var u=URL.createObjectURL(blob); window.open(u,'_blank');
    }, 'image/png');
  } else { window.open(canvas.toDataURL('image/png'),'_blank'); }
}
function invoiceFromBill(Z,R,b,opts){

    fn='receipt_'+(R.no||'room')+'_'+b.date;

    st=(bal>0?'ค้างชำระ':'ชำระครบแล้ว'); stc=(bal>0?'#c0392b':'#15803d');
    ml=[['ผู้เช่า',R.tenantName||'-'],['สถานที่',Z.name+' ห้อง '+(R.no||'-')],['เลขที่เอกสาร','INV-'+(''+b.date).replace(/-/g,'')+'-'+(R.no||'')]];
    mr=[['วันที่ออกบิล',fmtBE(b.date)],['ครบกำหนดชำระ',fmtBE(b.dueDate||b.date)]];

    fn='bill_'+(R.no||'room')+'_'+b.date;

    metaLeft:ml, metaRight:mr, items:items, total:b.total, paid:(b.paid||0), balance:bal, balanceLabel:'คงเหลือต้องชำระ', note:note };
